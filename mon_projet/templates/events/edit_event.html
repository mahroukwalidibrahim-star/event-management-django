{% extends 'base.html' %}

{% block title %}Modifier {{ event.titre }} - EventHub{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        
        <div class="mb-3">
            <a href="javascript:history.back()" class="text-decoration-none text-muted">
                <i class="bi bi-arrow-left"></i> Retour
            </a>
        </div>
        
        <div class="card shadow-sm border-0">
            <div class="card-header bg-white py-3">
                <h3 class="fw-bold mb-0 text-primary">Modifier l'événement</h3>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    {% csrf_token %}
                    {{ form.as_p }}
                    
                    <div class="d-flex justify-content-end gap-2 mt-4 pt-3 border-top">
                        <a href="javascript:history.back()" class="btn btn-light">Annuler</a>
                        <button type="submit" class="btn btn-primary px-4">Mettre à jour</button>
                    </div>
                </form>
            </div>
        </div>
        
    </div>
</div>
{% endblock %}
